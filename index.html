<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>บันทึกการทำงานรายวัน | IT Support</title>
    <link rel="stylesheet" href="./styles.css?v=20260705-7" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main">
        <header class="topbar">
          <div class="topbar-head">
            <div class="brand">
              <div class="brand-mark">IT</div>
              <div>
                <strong>IT Support Log</strong>
                <span>ระบบบันทึกงานรายวัน</span>
              </div>
            </div>
            <div>
              <p class="section-label">ฝ่ายสนับสนุนเทคโนโลยีสารสนเทศ</p>
              <h1>บันทึกการทำงานรายวัน</h1>
            </div>
          </div>
        </header>

        <section class="form-only-layout">
          <form class="panel form-panel" id="daily-form" autocomplete="off">
            <div class="panel-heading">
              <div>
                <h2>เพิ่มรายการงาน</h2>
                <p>กรอกข้อมูลเฉพาะรายการงาน ไม่ใช่ Ticket</p>
              </div>
              <span class="form-mode" id="formMode">รายการใหม่</span>
            </div>

            <div class="field-grid two">
              <label>
                วันที่
                <div class="date-input-wrap">
                  <input id="workDate" name="workDate" type="text" inputmode="numeric" placeholder="วว/ดด/ปป เช่น 05/07/69" required />
                  <button class="date-picker-button" id="openCalendar" type="button" title="เปิดปฏิทิน">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" /></svg>
                  </button>
                </div>
                <div class="thai-calendar" id="thaiCalendar" hidden></div>
                <span class="hint" id="thaiDatePreview">-</span>
              </label>
              <label>
                เจ้าหน้าที่
                <select id="staff" name="staff" required></select>
              </label>
              <label>
                เวลาเริ่ม
                <input id="startTime" name="startTime" type="text" inputmode="numeric" placeholder="HH:mm เช่น 09:00" pattern="^([01][0-9]|2[0-3]):[0-5][0-9]$" required />
              </label>
              <label>
                เวลาเสร็จ
                <input id="endTime" name="endTime" type="text" inputmode="numeric" placeholder="HH:mm เช่น 17:30" pattern="^([01][0-9]|2[0-3]):[0-5][0-9]$" />
              </label>
            </div>

            <div class="field-grid two">
              <label>
                หมวดงานหลัก
                <select id="mainCategory" name="mainCategory" required></select>
              </label>
              <label>
                ประเภทย่อย
                <select id="subCategory" name="subCategory" required></select>
              </label>
            </div>

            <div class="field-grid two">
              <label>
                สถานะ
                <select id="status" name="status" required>
                  <option value="ระหว่างดำเนินการ">ระหว่างดำเนินการ</option>
                  <option value="สำเร็จ">สำเร็จ</option>
                  <option value="ไม่สำเร็จ">ไม่สำเร็จ</option>
                  <option value="ต่อเนื่องวันถัดไป">ต่อเนื่องวันถัดไป</option>
                  <option value="ยกเลิก">ยกเลิก</option>
                </select>
              </label>
              <label>
                ระยะเวลา
                <input id="duration" name="duration" type="text" readonly value="-" />
              </label>
            </div>

            <label>
              หัวข้องาน
              <input id="workTitle" name="workTitle" type="text" maxlength="120" placeholder="เช่น ตรวจสอบระบบอินเทอร์เน็ตอาคาร 2" required />
            </label>

            <label>
              รายละเอียดงาน
              <textarea id="workDetail" name="workDetail" rows="5" maxlength="2000" placeholder="ระบุสิ่งที่ทำ สถานที่ ระบบ อุปกรณ์ หรือผู้เกี่ยวข้อง" required></textarea>
              <span class="hint"><span id="detailCount">0</span>/2000 ตัวอักษร</span>
            </label>

            <label>
              ผลการดำเนินงาน / หมายเหตุ
              <textarea id="resultNote" name="resultNote" rows="3" maxlength="1000" placeholder="สรุปผล ปัญหาที่พบ หรือสิ่งที่ต้องติดตาม"></textarea>
            </label>

            <label>
              ไฟล์แนบ
              <input id="attachments" name="attachments" type="file" multiple />
              <span class="hint">ตัวอย่างนี้เก็บเฉพาะชื่อไฟล์ใน browser เพื่อเตรียมต่อระบบ upload ภายหลัง</span>
            </label>

            <div class="form-actions">
              <button class="ghost-button" id="resetForm" type="button">ล้างข้อมูล</button>
              <button class="ghost-button" id="openSummaryPage" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5M9 19v-8M14 19v-5M19 19V8" /></svg>
                สรุปรายการทั้งหมด
              </button>
              <button class="primary-button" type="submit">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" /><path d="M17 21v-8H7v8M7 3v5h8" /></svg>
                บันทึก
              </button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js?v=20260705-7"></script>
  </body>
</html>
